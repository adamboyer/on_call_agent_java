spring:
  profiles:
    active:
    - local
  datasource:
    url: jdbc:h2:mem:oncalldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  ai:
    model:
      chat: openai
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-5.4
          temperature: 0.1
    # ollama:
    #   base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    #   chat:
    #     options:
    #       model: ${OLLAMA_MODEL:llama3.2}
    #       temperature: 0.1
    #       format: json

server:
  port: 8080

code:
  repo:
    default-target-system: api_with_error
    default-repo-name: adamboyer/api_with_error
    default-base-branch: master

github:
  token: ${GITHUB_TOKEN:}
  api-base-url: ${GITHUB_API_BASE_URL:https://api.github.com}

logging:
  level:
    org.springframework.ai: INFO
    com.example.oncallagent: INFO
