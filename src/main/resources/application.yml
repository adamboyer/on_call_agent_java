spring:
  datasource:
    url: jdbc:h2:mem:oncalldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  ai:
    model:
      chat: ollama
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.1:8b}
          temperature: 0.1
          format: json

server:
  port: 8080

aws:
  region: ${AWS_REGION:}
  s3:
    bucket: ${AWS_S3_BUCKET:on-call-schedule-agent}
    key: ${AWS_S3_KEY:oncall_person.json}

slack:
  bot-token: ${SLACK_BOT_TOKEN:}
  approval-callback-url: ${SLACK_APPROVAL_CALLBACK_URL:http://localhost:8080/api/approvals/response}

logging:
  level:
    org.springframework.ai: INFO
    com.example.oncallagent: INFO
